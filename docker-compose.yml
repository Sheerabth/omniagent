services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: omniagent
      POSTGRES_USER: omniagent
      POSTGRES_PASSWORD: omniagent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omniagent"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgresql://omniagent:omniagent@postgres/omniagent
      OMNIAGENT_API_KEY: ${OMNIAGENT_API_KEY:-}
      OMNIAGENT_ENCRYPTION_KEY: ${OMNIAGENT_ENCRYPTION_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgresql://omniagent:omniagent@postgres/omniagent
      OMNIAGENT_CLAUDE_API_KEY: ${OMNIAGENT_CLAUDE_API_KEY:-}
      OMNIAGENT_ANTIGRAVITY_API_KEY: ${OMNIAGENT_ANTIGRAVITY_API_KEY:-}
      OMNIAGENT_ENCRYPTION_KEY: ${OMNIAGENT_ENCRYPTION_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
