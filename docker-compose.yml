services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: omniagent
      POSTGRES_USER: omniagent
      POSTGRES_PASSWORD: omniagent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omniagent"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
