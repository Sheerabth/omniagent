networks:
  omniagent_net:

services:
  postgres:
    container_name: omniagent-pg
    image: postgres:16
    environment:
      POSTGRES_DB: omniagent
      POSTGRES_USER: omniagent
      POSTGRES_PASSWORD: omniagent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - omniagent_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omniagent"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    container_name: omniagent-api
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgresql://omniagent:omniagent@postgres/omniagent
      OMNIAGENT_ENCRYPTION_KEY: ${OMNIAGENT_ENCRYPTION_KEY:-}
      UI_PASSWORD: ${UI_PASSWORD:-}
    networks:
      - omniagent_net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 3

  worker:
    container_name: omniagent-worker
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env                    # shared vars (DATABASE_URL, encryption, langfuse)
    environment:
      DATABASE_URL: postgresql://omniagent:omniagent@postgres/omniagent
      OMNIAGENT_ENCRYPTION_KEY: ${OMNIAGENT_ENCRYPTION_KEY:-}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-}
    volumes:
      - ./.env.claude:/app/.env.claude:ro
      - ./.env.antigravity:/app/.env.antigravity:ro
      - ./.env.pydantic:/app/.env.pydantic:ro
    networks:
      - omniagent_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    container_name: omniagent-nginx
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - omniagent_net
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
